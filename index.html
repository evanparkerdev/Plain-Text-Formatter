<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Cleaner</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Text Cleaner</h1>
        <p class="subtitle">Remove extra spaces, empty lines, and normalize spacing.</p>
      </header>

      <section class="panel">
        <div class="toolbar">
          <div class="toolbar-left">
            <button id="btnExample" class="btn" type="button">Generate example</button>

            <div class="toggles" role="group" aria-label="Formatting options">
              <label class="toggle">
                <input id="optTrimLines" type="checkbox" checked />
                <span>Trim line edges</span>
              </label>
              <label class="toggle">
                <input id="optCollapseSpaces" type="checkbox" checked />
                <span>Collapse spaces/tabs</span>
              </label>
              <label class="toggle">
                <input id="optCollapseBlankLines" type="checkbox" checked />
                <span>Collapse blank lines</span>
              </label>
            </div>
          </div>

          <div class="actions">
            <button id="btnClear" class="btn btn-ghost" type="button">Clear</button>
            <button id="btnDownload" class="btn" type="button">Download .txt</button>
            <button id="btnCopy" class="btn btn-primary" type="button">
              Copy cleaned text
            </button>
          </div>
        </div>

        <div class="grid">
          <div class="field">
            <label for="inputText">Raw input</label>
            <textarea
              id="inputText"
              spellcheck="false"
              placeholder="Paste or type raw text here…"
            ></textarea>
          </div>

          <div class="field">
            <label for="outputText">Cleaned output</label>
            <textarea id="outputText" readonly spellcheck="false"></textarea>
            <div class="status" aria-live="polite">
              <span id="statusText">Ready</span>
              <span class="spacer"></span>
              <span id="statsText" class="muted"></span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <span class="footer-left">© <span id="footerYear">2026</span> Text Cleaner</span>
        <span class="footer-right">
          <span>Developed by </span>
          <a class="footer-link" href="https://x.com/evanparkerdev" target="_blank" rel="noreferrer">
            Evan Parker
          </a>
        </span>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
